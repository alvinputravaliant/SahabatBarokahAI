kind = "web"
previewPath = "/"
title = "SahabatBarokahAI"
version = "1.0.0"
id = "artifacts/sahabat-barokah"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24345
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/sahabat-barokah run dev"

[services.env]
PORT = "24345"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/sahabat-barokah", "run", "build"]
publicDir = "artifacts/sahabat-barokah/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
